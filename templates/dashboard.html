<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskBot V3 Pro Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background: #0b0f19; color: #fff; overflow-x: hidden; }
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 35%), radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 35%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1.5rem; }
        h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 1.5px; margin: 0; }
        
        .glass-card {
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        
        .emoji-badge { font-size: 3rem; margin-bottom: 0.5rem; }
        .status-text { font-size: 1.2rem; font-weight: 600; color: #38bdf8; }
        .metric-val { font-size: 2.2rem; font-weight: bold; margin: 0.5rem 0; color: #f8fafc; }
        .metric-label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        
        .warning { border-color: rgba(245, 158, 11, 0.5); box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); animation: pulse 2s infinite; }
        .warning .status-text { color: #f59e0b; }
        .critical { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); animation: pulse-critical 1s infinite; }
        .critical .status-text { color: #ef4444; }
        .calibrating { border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); animation: pulse-calib 1.5s infinite; }
        .calibrating .status-text { color: #38bdf8; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
            50% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
            100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        }
        @keyframes pulse-critical {
            0% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
            100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        }
        @keyframes pulse-calib {
            0% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
            50% { box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); }
            100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        }
        
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 8px; margin-top: 5px; overflow: hidden; height: 10px; }
        .progress-bar { height: 100%; background: #38bdf8; transition: width 0.3s; }
        .progress-bar.danger { background: #ef4444; }
        .progress-bar.success { background: #10b981; }
        
        input[type=range] { width: 100px; margin: 0 10px; accent-color: #38bdf8; }
        input[type=number], input[type=text] { padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; }
        
        button { background: #38bdf8; color: #0b0f19; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #0ea5e9; }
        button.danger { background: #ef4444; color: white; }
        button.danger:hover { background: #dc2626; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="bg-blobs"></div>
    <div class="container">
        <header>
            <h1>DeskBot V3 <span style="color: #38bdf8; font-weight: bold;">Pro Embedded</span></h1>
        </header>
        
        <div class="glass-card" style="margin-bottom: 2rem; text-align: center;">
            <h3 style="margin-top: 0; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">Live Feed</h3>
            <img src="/video_feed" alt="Video Feed" style="max-width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
        </div>
        
        <div id="targets-container" class="grid"></div>
        
        <div class="glass-card" style="margin-top: 3rem; overflow-x: auto;">
            <h3 style="margin-top: 0; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">Profile Control Manager Grid</h3>
            <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
                <input type="text" id="new-profile-name" placeholder="Enter New Profile Name">
                <button onclick="createProfile()">Register Current Unknown</button>
            </div>
            <div id="profiles-container"></div>
        </div>
    </div>

    <script>
        function getEmoji(state) {
            if (!state) return "⏸️";
            if (state.includes("Active") || state.includes("Tracking Active")) return "🧘";
            if (state.includes("Looking Away") || state.includes("Ocular Break")) return "👀";
            if (state.includes("Standing")) return "🧍";
            if (state.includes("Session Limit Reached")) return "🚨";
            if (state.includes("Posture Deficit Alert")) return "⚠️";
            if (state.includes("Calibrating")) return "⚙️";
            if (state.includes("Unregistered Guest")) return "🔒";
            return "⏸️";
        }

        async function refreshLiveTelemetry() {
            try {
                const res = await fetch('/api/metrics_slice');
                const targets = await res.json();
                
                const container = document.getElementById('targets-container');
                container.innerHTML = '';
                
                if (targets.length === 0) {
                    container.innerHTML = '<div class="glass-card" style="text-align: center; color: #94a3b8; font-style: italic;">Monitoring offline or no targets in frame...</div>';
                    return;
                }
                
                targets.forEach(t => {
                    let sittingTime = t.sitting_time !== undefined ? Math.round(t.sitting_time) : 0;
                    let standingTime = t.standing_time !== undefined ? Math.round(t.standing_time) : 0;
                    let headPitch = t.pitch !== undefined ? Math.round(t.pitch) : 0;
                    let sessionLimit = t.session_limit !== undefined ? Math.round(t.session_limit) : 1200;
                    let standRequirement = t.stand_requirement !== undefined ? Math.round(t.stand_requirement) : 180;
                    let gazeAwayTime = t.gaze_away_time !== undefined ? Math.round(t.gaze_away_time) : 0;
                    
                    let sitPct = Math.min(100, (sittingTime / sessionLimit) * 100);
                    let standPct = Math.min(100, (standingTime / standRequirement) * 100);
                    
                    const isWarning = t.state && (t.state.includes("Alert") || t.state.includes("Ocular"));
                    const isCritical = t.state && t.state.includes("Session Limit");
                    const isCalibrating = t.state && t.state.includes("Calibrating");
                    
                    let cardClass = "glass-card";
                    if (isCritical) cardClass += " critical";
                    else if (isWarning) cardClass += " warning";
                    else if (isCalibrating) cardClass += " calibrating";
                    
                    const card = document.createElement('div');
                    card.className = cardClass;
                    
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <div class="emoji-badge">${getEmoji(t.state)}</div>
                                <div class="status-text">${t.state || 'Unknown State'}</div>
                            </div>
                            <div style="text-align: right; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px;">
                                <span style="font-size: 0.85rem; color: #94a3b8; margin-right: 8px;">TARGET:</span>
                                <span style="font-size: 1rem; color: #fff; font-weight: 500;">${t.name}</span>
                            </div>
                        </div>
                        
                        <div style="margin-top: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                                <span>Continuous Sitting Limit Cap</span>
                                <span>${sittingTime}s / ${sessionLimit}s</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar ${sitPct > 90 ? 'danger' : ''}" style="width: ${sitPct}%;"></div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 1rem;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                                <span>Mandatory Stand Duration Requirement</span>
                                <span>${standingTime}s / ${standRequirement}s</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar success" style="width: ${standPct}%;"></div>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                            <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                                <div class="metric-label">Head Pitch</div>
                                <div class="metric-val">${headPitch}°</div>
                            </div>
                            <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                                <div class="metric-label">Gaze Away</div>
                                <div class="metric-val">${gazeAwayTime}s</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Telemetry error", e);
            }
        }

        async function pollProfiles() {
            try {
                const res = await fetch('/api/profiles');
                const profiles = await res.json();
                
                const container = document.getElementById('profiles-container');
                let html = `<table>
                    <tr>
                        <th>Name</th>
                        <th>3D Posture Tolerance Edge</th>
                        <th>Continuous Sitting Cap (Seconds)</th>
                        <th>Required Stand Duration (Seconds)</th>
                        <th>Look-Away Limit (s)</th>
                        <th>Actions</th>
                    </tr>`;
                
                profiles.forEach(p => {
                    html += `
                        <tr>
                            <td style="font-weight: 500;">${p.user_name}</td>
                            <td>
                                <input type="range" min="5" max="45" value="${p.slouch_sensitivity}" style="width: 100px;"
                                    onchange="updateProfile('${p.user_name}', this.value, ${p.session_limit}, ${p.stand_requirement}, ${p.gaze_away_limit})">
                                <span>${p.slouch_sensitivity}°</span>
                            </td>
                            <td>
                                <input type="range" min="60" max="3600" step="60" value="${p.session_limit}" style="width: 100px;"
                                    onchange="updateProfile('${p.user_name}', ${p.slouch_sensitivity}, this.value, ${p.stand_requirement}, ${p.gaze_away_limit})">
                                <span>${p.session_limit}s</span>
                            </td>
                            <td>
                                <input type="range" min="30" max="600" step="30" value="${p.stand_requirement}" style="width: 100px;"
                                    onchange="updateProfile('${p.user_name}', ${p.slouch_sensitivity}, ${p.session_limit}, this.value, ${p.gaze_away_limit})">
                                <span>${p.stand_requirement}s</span>
                            </td>
                            <td>
                                <input type="range" min="5" max="120" step="5" value="${p.gaze_away_limit}" style="width: 100px;"
                                    onchange="updateProfile('${p.user_name}', ${p.slouch_sensitivity}, ${p.session_limit}, ${p.stand_requirement}, this.value)">
                                <span>${p.gaze_away_limit}s</span>
                            </td>
                            <td><button class="danger" onclick="deleteProfile('${p.user_name}')">Purge</button></td>
                        </tr>
                    `;
                });
                html += '</table>';
                container.innerHTML = html;
            } catch (e) {
                console.error("Profile sync error", e);
            }
        }

        async function createProfile() {
            const name = document.getElementById('new-profile-name').value;
            if (!name) return alert("Enter a valid profile name.");
            const res = await fetch('/api/profile/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.error) alert(data.error);
            
            document.getElementById('new-profile-name').value = '';
            pollProfiles();
            refreshLiveTelemetry();
        }

        async function updateProfile(name, slouch_sens, limit, stand_req, gaze_limit) {
            await fetch('/api/profile/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    name, 
                    slouch_sensitivity: parseFloat(slouch_sens), 
                    session_limit: parseInt(limit),
                    stand_requirement: parseInt(stand_req),
                    gaze_away_limit: parseInt(gaze_limit)
                })
            });
            pollProfiles();
            refreshLiveTelemetry();
        }

        async function deleteProfile(name) {
            if(!confirm("Are you sure you want to permanently delete profile '" + name + "'?")) return;
            await fetch('/api/profile/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            pollProfiles();
            refreshLiveTelemetry();
        }

        setInterval(refreshLiveTelemetry, 1000);
        setInterval(pollProfiles, 4000);
        
        refreshLiveTelemetry();
        pollProfiles();
    </script>
</body>
</html>
