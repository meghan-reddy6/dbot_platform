<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskBot V3 Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background: #0b0f19; color: #fff; overflow-x: hidden; }
        .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.15), transparent 35%), radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 35%); }
        .container { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1.5rem; }
        h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 1.5px; margin: 0; }
        
        .glass-card {
            background: rgba(18, 22, 40, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        
        .emoji-badge { font-size: 3rem; margin-bottom: 0.5rem; }
        .status-text { font-size: 1.2rem; font-weight: 600; color: #38bdf8; }
        .metric-val { font-size: 2.2rem; font-weight: bold; margin: 0.5rem 0; color: #f8fafc; }
        .metric-label { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        
        .warning { border-color: rgba(245, 158, 11, 0.5); box-shadow: 0 0 20px rgba(245, 158, 11, 0.15); animation: pulse 2s infinite; }
        .warning .status-text { color: #f59e0b; }
        .critical { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); animation: pulse-critical 1s infinite; }
        .critical .status-text { color: #ef4444; }
        .calibrating { border-color: rgba(56, 189, 248, 0.5); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); animation: pulse-calib 1.5s infinite; }
        .calibrating .status-text { color: #38bdf8; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
            50% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
            100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        }
        @keyframes pulse-critical {
            0% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
            100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        }
        @keyframes pulse-calib {
            0% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
            50% { box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); }
            100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        }
        
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 8px; margin-top: 5px; overflow: hidden; height: 10px; }
        .progress-bar { height: 100%; background: #38bdf8; transition: width 0.3s; }
        .progress-bar.danger { background: #ef4444; }
        .progress-bar.success { background: #10b981; }
        
        input[type=range] { width: 100px; margin: 0 10px; accent-color: #38bdf8; }
        input[type=number], input[type=text] { padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; }
        
        button { background: #38bdf8; color: #0b0f19; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #0ea5e9; }
        button.danger { background: #ef4444; color: white; }
        button.danger:hover { background: #dc2626; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
    

        /* New Split Layout Styles */
        .split-layout {
            display: flex;
            flex-direction: row;
            gap: 2rem;
            margin-bottom: 3rem;
            align-items: flex-start;
        }
        .video-pane {
            flex: 1.4;
            background: #000;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }
        .metrics-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        @media (max-width: 1024px) {
            .split-layout { flex-direction: column; }
            .video-pane, .metrics-pane { width: 100%; flex: none; }
        }

    
.slouch-alert {
    animation: pulse-red-glow 2s infinite;
}

@keyframes pulse-red-glow {
    0% { background: rgba(30, 0, 0, 0.4); box-shadow: 0 0 10px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.5); }
    50% { background: rgba(80, 0, 0, 0.6); box-shadow: 0 0 30px rgba(255, 0, 0, 0.9), inset 0 0 20px rgba(255, 0, 0, 0.5); border: 1px solid rgba(255, 0, 0, 1.0); }
    100% { background: rgba(30, 0, 0, 0.4); box-shadow: 0 0 10px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.5); }
}

/* Tell-Tale Dashboard Animations */
.telltale-box {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
    opacity: 0.25; 
    filter: grayscale(80%);
}
.telltale-active {
    opacity: 1;
    filter: grayscale(0%);
}

.telltale-glow-green { box-shadow: 0 0 12px rgba(16, 185, 129, 0.4), inset 0 0 10px rgba(16, 185, 129, 0.2); border-color: #10b981; }
.telltale-glow-blue { box-shadow: 0 0 12px rgba(56, 189, 248, 0.4), inset 0 0 10px rgba(56, 189, 248, 0.2); border-color: #38bdf8; }
.telltale-glow-orange { box-shadow: 0 0 12px rgba(245, 158, 11, 0.4), inset 0 0 10px rgba(245, 158, 11, 0.2); border-color: #f59e0b; }
.telltale-glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6), inset 0 0 15px rgba(239, 68, 68, 0.4); border-color: #ef4444; }
.telltale-glow-purple { box-shadow: 0 0 12px rgba(168, 85, 247, 0.4), inset 0 0 10px rgba(168, 85, 247, 0.2); border-color: #a855f7; }
.telltale-glow-gray { box-shadow: 0 0 10px rgba(148, 163, 184, 0.3), inset 0 0 8px rgba(148, 163, 184, 0.1); border-color: #94a3b8; }

.anim-breathe { animation: breathe 4s ease-in-out infinite; }
@keyframes breathe { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

.anim-rotate-scan { animation: spin 4s linear infinite; transform-origin: 50px 20px; }
@keyframes spin { 100% { transform: rotate(360deg); } }

.anim-pulse-gentle { animation: pulseG 3s infinite; }
@keyframes pulseG { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }

.anim-pulse-warn { animation: pulseW 2s infinite; }
@keyframes pulseW { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

.anim-pulse-crit { animation: pulseC 1s infinite; }
@keyframes pulseC { 0%, 100% { opacity: 0.6; transform: scale(1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); } 50% { opacity: 1; transform: scale(1.05); box-shadow: 0 0 25px rgba(239, 68, 68, 0.8); } }

.anim-scan-y { animation: scanY 2s linear infinite; }
@keyframes scanY { 0% { transform: translateY(-40px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(40px); opacity: 0; } }

.anim-float { animation: float 2s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

.anim-sparkle { animation: sparkle 2s infinite; }
@keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } }

/* CSS State Transitions for Persistent SVGs */
.svg-part { transition: all 0.4s ease; stroke: inherit; fill: inherit; }
.svg-torso { transform-origin: 50px 65px; }
.svg-head { transform-origin: 50px 20px; }
.svg-overlay { opacity: 0; transition: opacity 0.3s ease; }

/* Base Colors */
.tracking-calibrating { stroke: #38bdf8; fill: #38bdf8; color: #38bdf8; }
.tracking-searching { stroke: #94a3b8; fill: #94a3b8; color: #94a3b8; }
.tracking-active { stroke: #64748b; fill: #64748b; color: #64748b; }

.posture-healthy { stroke: #10b981; fill: #10b981; color: #10b981; }
.posture-slouching { stroke: #f59e0b; fill: #f59e0b; color: #f59e0b; }
.posture-critical { stroke: #ef4444; fill: #ef4444; color: #ef4444; }
.posture-inactive { stroke: #64748b; fill: #64748b; color: #64748b; }

.eyes-ocular_break { stroke: #a855f7; fill: #a855f7; color: #a855f7; }
.eyes-normal { stroke: #64748b; fill: #64748b; color: #64748b; }
.eyes-inactive { stroke: #64748b; fill: #64748b; color: #64748b; }

.sitting-normal { stroke: #10b981; fill: #10b981; color: #10b981; }
.sitting-warning { stroke: #f59e0b; fill: #f59e0b; color: #f59e0b; }
.sitting-exceeded { stroke: #ef4444; fill: #ef4444; color: #ef4444; }
.sitting-inactive { stroke: #64748b; fill: #64748b; color: #64748b; }

.movement-standing_break { stroke: #10b981; fill: #10b981; color: #10b981; }
.movement-standing_complete { stroke: #10b981; fill: #10b981; color: #10b981; }
.movement-inactive { stroke: #64748b; fill: #64748b; color: #64748b; }

/* Tracking State Logic */
.tracking-searching .svg-body { opacity: 0.4; stroke-dasharray: 4 4; }
.tracking-searching .overlay-scanline { opacity: 1; }
.tracking-calibrating .overlay-calib { opacity: 1; }

/* Posture State Logic */
.posture-slouching .svg-torso { transform: rotate(15deg); }
.posture-slouching .svg-head { transform: translate(0px, 5px); }
.posture-critical .svg-torso { transform: rotate(35deg); }
.posture-critical .svg-head { transform: translate(0px, 10px); }
.posture-critical .overlay-warning { opacity: 1; }

/* Eyes State Logic */
.eyes-ocular_break .svg-head { transform: translate(-5px, 0px); }
.eyes-ocular_break .eyes-forward { display: none; }
.eyes-ocular_break .eyes-left { display: block; opacity: 1; }
.eyes-ocular_break .overlay-eye { opacity: 1; }
.eyes-normal .eyes-left { display: none; }

/* Sitting State Logic */
.sitting-normal .overlay-stopwatch { opacity: 1; }
.sitting-warning .overlay-stopwatch { opacity: 1; }
.sitting-exceeded .overlay-stopwatch { opacity: 1; }
.sitting-exceeded .overlay-uparrow { opacity: 1; }

/* Movement State Logic */
.movement-standing_break .overlay-ring { opacity: 1; }
.movement-standing_break .overlay-uparrow { opacity: 1; }
.movement-standing_complete .overlay-check { opacity: 1; }
.movement-standing_complete .overlay-sparkle { opacity: 1; }

</style>
</head>
<body>
    <div class="bg-blobs"></div>
    <div class="container">
        <header style="justify-content: center;">
            <h1 style="text-align: center; letter-spacing: 4px; font-weight: 600;">DESKBOT</h1>
        </header>
        
        <!-- SIDE-BY-SIDE SPLIT VIEW -->
        <div class="split-layout">
            <!-- Left Pane (60% Width / flex: 1.4) -->
            <div class="video-pane">
                <h3 style="margin-top: 0; margin-bottom: 1rem; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">Live Feed</h3>
                <img src="/video_feed" alt="Video Feed" style="width: 100%; max-height: 520px; object-fit: contain; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            </div>
            
            <!-- Right Pane (40% Width / flex: 1) -->
            <div id="targets-container" class="metrics-pane"></div>
        </div>
        
        <!-- ANALYTICS & DIAGNOSTICS ROW -->
        <div class="split-layout" style="margin-top: 1rem; margin-bottom: 3rem;">
            <div class="glass-card" style="flex: 1.4;">
                <h3 style="margin-top: 0; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">Historical Posture Analytics</h3>
                <canvas id="analyticsChart" style="width: 100%; max-height: 250px;"></canvas>
            </div>
            
            <div class="glass-card" style="flex: 1;">
                <h3 style="margin-top: 0; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">System Diagnostics</h3>
                <div id="diagnostics-container" style="display: flex; flex-direction: column; gap: 0.8rem; color: #cbd5e1; font-size: 0.95rem;">
                    <div>Loading system diagnostics...</div>
                </div>
            </div>
        </div>
        
        <!-- PROFILE MANAGEMENT INTERFACE (Bottom span 100%) -->
        <div class="glass-card" style="width: 100%; overflow-x: auto; box-sizing: border-box;">
            <h3 style="margin-top: 0; color: #e2e8f0; font-weight: 400; font-size: 1.5rem;">Profile Control Manager Grid</h3>
            <div id="system-message-container" style="color: #10b981; font-size: 0.95rem; font-style: italic; margin-bottom: 1rem; border-left: 3px solid #10b981; padding-left: 10px; background: rgba(16, 185, 129, 0.1); padding: 8px 12px; border-radius: 4px;">
                <strong>Last Spoken Alert:</strong> <span id="system-message-text">Awaiting messages...</span>
            </div>
            <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <input type="text" id="new-profile-name" placeholder="Enter New Profile Name">
                <button onclick="createProfile()">Register Current Unknown</button>
                <button onclick="triggerManualRecalibrate()" style="background: linear-gradient(135deg, #3b82f6, #06b6d4); color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-left: 10px; box-shadow: 0 0 12px rgba(6, 182, 212, 0.2);" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                    🔄 Recalibrate Posture
                </button>
            </div>
            <div id="profiles-container"></div>
        </div>
    </div>

    <script>
        const SvgElements = {
            chair: `<path d="M 30 65 L 70 65 L 70 95 M 30 65 L 30 35" fill="none" stroke-width="4" stroke-linecap="round" stroke="rgba(255,255,255,0.2)"/>`,
            legsSitting: `<path d="M 50 65 L 75 65 L 75 95" fill="none" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" class="svg-part svg-body"/>`,
            legsStanding: `<path d="M 50 65 L 50 95 M 50 95 L 45 95 M 50 95 L 55 95" fill="none" stroke-width="8" stroke-linecap="round" class="svg-part"/>`,
            torso: `<path d="M 50 35 L 50 65" fill="none" stroke-width="10" stroke-linecap="round" class="svg-part svg-torso svg-body"/>`,
            head: `
                <g class="svg-part svg-head svg-body">
                    <circle cx="50" cy="20" r="12" class="svg-part"/>
                    <g class="eyes-forward"><circle cx="45" cy="18" r="1.5" fill="#0f172a"/><circle cx="55" cy="18" r="1.5" fill="#0f172a"/></g>
                    <g class="eyes-left" style="display:none;"><circle cx="42" cy="18" r="1.5" fill="#0f172a"/></g>
                </g>
            `,
            calibScan: `<circle cx="50" cy="20" r="22" fill="none" stroke-width="2" class="svg-part svg-overlay overlay-calib anim-rotate-scan" stroke-dasharray="20 10"/>`,
            scanLine: `<line x1="20" y1="50" x2="80" y2="50" stroke-width="2" class="svg-part svg-overlay overlay-scanline anim-scan-y"/>`,
            warningBadge: `<g class="svg-part svg-overlay overlay-warning" transform="translate(85, 25)"><circle cx="0" cy="0" r="8"/><line x1="0" y1="-4" x2="0" y2="2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="0" cy="5" r="1" fill="#fff"/></g>`,
            eye: `<g class="svg-part svg-overlay overlay-eye" transform="translate(80, 20)"><path d="M-8 0 Q0 -8 8 0 Q0 8 -8 0" fill="none" stroke-width="2"/><circle cx="0" cy="0" r="3"/></g>`,
            stopwatch: `
                <g class="svg-part svg-overlay overlay-stopwatch" transform="translate(80, 25)">
                    <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
                    <circle cx="0" cy="0" r="12" fill="none" stroke-width="3" stroke-dasharray="75.39" stroke-dashoffset="var(--timer-offset, 75.39)" transform="rotate(-90)"/>
                    <line x1="0" y1="0" x2="0" y2="-8" stroke-width="2"/>
                    <line x1="0" y1="-14" x2="0" y2="-17" stroke-width="3"/>
                </g>`,
            upArrow: `<path d="M85 40 L85 20 M75 30 L85 20 L95 30" fill="none" stroke-width="4" stroke-linecap="round" class="svg-part svg-overlay overlay-uparrow anim-float"/>`,
            progressRing: `
                <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4" class="svg-part svg-overlay overlay-ring"/>
                <circle cx="50" cy="50" r="40" fill="none" stroke-width="4" stroke-dasharray="251.32" stroke-dashoffset="var(--stand-offset, 251.32)" transform="rotate(-90 50 50)" class="svg-part svg-overlay overlay-ring"/>
            `,
            check: `<path d="M65 35 L75 45 L90 25" fill="none" stroke-width="4" stroke-linecap="round" class="svg-part svg-overlay overlay-check"/>`,
            sparkles: `<path d="M80 15 L82 20 L87 22 L82 24 L80 29 L78 24 L73 22 L78 20 Z" class="svg-part svg-overlay overlay-sparkle anim-sparkle"/>`
        };

        function buildDashboardDOM(trackId) {
            const boxes = [
                { id: 'tracking', label: 'Tracking', base: SvgElements.chair + SvgElements.legsSitting + SvgElements.torso + SvgElements.head, overlays: SvgElements.calibScan + SvgElements.scanLine },
                { id: 'posture', label: 'Posture', base: SvgElements.chair + SvgElements.legsSitting + SvgElements.torso + SvgElements.head, overlays: SvgElements.warningBadge },
                { id: 'eyes', label: 'Eyes', base: SvgElements.chair + SvgElements.legsSitting + SvgElements.torso + SvgElements.head, overlays: SvgElements.eye },
                { id: 'sitting', label: 'Sitting', base: SvgElements.chair + SvgElements.legsSitting + SvgElements.torso + SvgElements.head, overlays: SvgElements.stopwatch + SvgElements.upArrow },
                { id: 'movement', label: 'Movement', base: SvgElements.legsStanding + SvgElements.torso + SvgElements.head, overlays: SvgElements.progressRing + SvgElements.upArrow + SvgElements.check + SvgElements.sparkles }
            ];

            let html = `<div class="dashboard-matrix" style="display: flex; flex-wrap: nowrap; gap: 16px; justify-content: center; width: 100%;">`;
            boxes.forEach(b => {
                html += `
                    <div id="box-${trackId}-${b.id}" class="telltale-box" style="width: 100px; height: 120px;">
                        <svg viewBox="0 0 100 100" style="width: 70px; height: 70px;">
                            ${b.base}
                            ${b.overlays}
                        </svg>
                        <div id="label-${trackId}-${b.id}" style="font-size: 0.65rem; font-weight: 700; text-transform: uppercase; text-align: center; margin-top: 8px; line-height: 1.2; transition: color 0.4s ease;">
                            ${b.label}
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        const stateDebouncers = new Map();
        const DEBOUNCE_MS = 1500;

        function updateStateDebounced(trackId, subsystem, newState, indicatorsDict, pctVal = 0) {
            const key = `${trackId}-${subsystem}`;
            
            // Apply percentages immediately via CSS vars so timers move smoothly
            const box = document.getElementById(`box-${trackId}-${subsystem}`);
            if (box) {
                if (subsystem === 'sitting') {
                    const offset = ((100 - pctVal) / 100) * 75.39;
                    box.style.setProperty('--timer-offset', offset);
                } else if (subsystem === 'movement') {
                    const offset = ((100 - pctVal) / 100) * 251.32;
                    box.style.setProperty('--stand-offset', offset);
                }
            }

            if (!stateDebouncers.has(key)) {
                stateDebouncers.set(key, { currentState: '', pendingState: '', timerId: null });
            }
            
            const stateObj = stateDebouncers.get(key);
            
            if (stateObj.currentState === newState) {
                if (stateObj.timerId) { clearTimeout(stateObj.timerId); stateObj.timerId = null; }
                return;
            }
            
            if (stateObj.pendingState !== newState) {
                stateObj.pendingState = newState;
                if (stateObj.timerId) clearTimeout(stateObj.timerId);
                
                stateObj.timerId = setTimeout(() => {
                    stateObj.currentState = newState;
                    applyStateDOM(trackId, subsystem, newState, indicatorsDict);
                }, DEBOUNCE_MS);
            }
        }

        function applyStateDOM(trackId, subsystem, state, indicatorsDict) {
            const box = document.getElementById(`box-${trackId}-${subsystem}`);
            const label = document.getElementById(`label-${trackId}-${subsystem}`);
            if (!box || !label) return;

            let isActive = state !== 'inactive';

            // Priority Logic: Dim Posture if Tracking is Searching
            if (subsystem === 'posture' && indicatorsDict.tracking === 'searching') {
                isActive = false;
                state = 'inactive';
            }

            let animClass = "";
            let glow = "";
            let labelText = subsystem;

            // Map state to visuals
            if (subsystem === 'tracking') {
                if (state === 'calibrating') { glow = "blue"; animClass = "anim-breathe"; labelText = "Calibrating"; }
                else if (state === 'searching') { glow = "gray"; labelText = "Searching"; isActive = false; }
                else { glow = "green"; labelText = "Tracking"; }
            } else if (subsystem === 'posture') {
                if (state === 'critical') { glow = "red"; animClass = "anim-pulse-crit"; labelText = "Crit. Slouch"; }
                else if (state === 'slouching') { glow = "orange"; animClass = "anim-pulse-warn"; labelText = "Slouching"; }
                else if (state === 'healthy') { glow = "green"; animClass = "anim-breathe"; labelText = "Healthy"; }
                else { glow = "gray"; labelText = "Posture"; isActive = false; }
            } else if (subsystem === 'eyes') {
                if (state === 'ocular_break') { glow = "purple"; animClass = "anim-breathe"; labelText = "Ocular Break"; }
                else if (state === 'normal') { glow = "green"; labelText = "Eyes Tracked"; }
                else { glow = "gray"; labelText = "Eye Health"; isActive = false; }
            } else if (subsystem === 'sitting') {
                if (state === 'exceeded') { glow = "red"; animClass = "anim-pulse-warn"; labelText = "Limit Exceeded"; }
                else if (state === 'warning') { glow = "orange"; animClass = "anim-breathe"; labelText = "Time Warning"; }
                else if (state === 'normal') { glow = "green"; animClass = "anim-breathe"; labelText = "Sitting"; }
                else { glow = "gray"; labelText = "Sitting"; isActive = false; }
            } else if (subsystem === 'movement') {
                if (state === 'standing_complete') { glow = "green"; animClass = "anim-breathe"; labelText = "Stand Done"; }
                else if (state === 'standing_break') { glow = "green"; animClass = "anim-breathe"; labelText = "Stand Break"; }
                else { glow = "gray"; labelText = "Movement"; isActive = false; }
            }

            box.className = `telltale-box ${subsystem}-${state} ${isActive ? `telltale-active telltale-glow-${glow} ${animClass}` : ''}`;
            label.innerText = labelText;
            label.style.color = isActive ? `var(--tw-colors-${glow}-500, ${glow})` : '#64748b'; // simplified color map
            if (glow === 'orange') label.style.color = '#f59e0b';
if (glow === 'red') label.style.color = '#ef4444';
            if (glow === 'green') label.style.color = '#10b981';
            if (glow === 'blue') label.style.color = '#38bdf8';
            if (glow === 'purple') label.style.color = '#a855f7';
            if (glow === 'gray') label.style.color = '#94a3b8';
        }

        async function getProfileConfig(name) {
            try {
                const res = await fetch('/api/profiles');
                const profiles = await res.json();
                return profiles[name] || {};
            } catch { return {}; }
        }

        async function refreshLiveTelemetry() {
            try {
                const res = await fetch('/api/metrics_slice');
                const targets = await res.json();
                
                const container = document.getElementById('targets-container');
                
                if (targets.length === 0) {
                    container.innerHTML = '<div class="glass-card" style="text-align: center; color: #94a3b8; font-style: italic;">Monitoring offline or no targets in frame...</div>';
                    return;
                }
                
                if (container.children.length === 1 && container.children[0].textContent.includes('offline')) {
                    container.innerHTML = '';
                }
                
                const currentTrackIds = new Set();
                
                for (const t of targets) {
                    currentTrackIds.add(String(t.id));
                    
                    let sittingTime = t.sitting_time !== undefined ? Math.round(t.sitting_time) : 0;
                    let standingTime = t.standing_time !== undefined ? Math.round(t.standing_time) : 0;
                    let headPitch = t.pitch !== undefined ? Math.round(t.pitch) : 0;
                    let sessionLimit = t.session_limit !== undefined ? Math.round(t.session_limit) : 1200;
                    let standRequirement = t.stand_requirement !== undefined ? Math.round(t.stand_requirement) : 180;
                    let sitPct = Math.min(100, (sittingTime / sessionLimit) * 100);
                    let standPct = Math.min(100, (standingTime / standRequirement) * 100);
                    
                    let card = document.getElementById(`target-card-${t.id}`);
                    
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `target-card-${t.id}`;
                        card.className = "glass-card";
                        
                        const profileConfig = await getProfileConfig(t.name);
                        const isUnknown = t.name.startsWith("Unknown");
                        const uiName = isUnknown ? `Unregistered #${t.id}` : t.name;
                        
                        card.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem;">
                                <div style="font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Live Status Matrix</div>
                                <div style="text-align: right; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px;">
                                    <span style="font-size: 0.85rem; color: #94a3b8; margin-right: 8px;">ACTIVE WORKSPACE USER:</span>
                                    <span id="name-${t.id}" style="font-size: 1rem; color: #fff; font-weight: 500;">${uiName}</span>
                                </div>
                            </div>
                            
                            <!-- PERSISTENT DASHBOARD MATRIX -->
                            <div id="matrix-container-${t.id}" style="margin-bottom: 2rem;">
                                ${buildDashboardDOM(t.id)}
                            </div>
                            
                            <div style="margin-top: 1.5rem;">
                                <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                                    <span>Continuous Sitting Limit Cap</span>
                                    <span id="sit-text-${t.id}"></span>
                                </div>
                                <div class="progress-container">
                                    <div id="sit-bar-${t.id}" class="progress-bar"></div>
                                </div>
                            </div>
                            
                            <div style="margin-top: 1rem;">
                                <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                                    <span>Mandatory Stand Duration Requirement</span>
                                    <span id="stand-text-${t.id}"></span>
                                </div>
                                <div class="progress-container">
                                    <div id="stand-bar-${t.id}" class="progress-bar success"></div>
                                </div>
                            </div>
                            
                            <div style="margin-top: 1rem; margin-bottom: 1rem;">
                                <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500; color: #cbd5e1;">
                                    <span>Continuous Screen Gaze Limit</span>
                                    <span id="gaze-text-${t.id}"></span>
                                </div>
                                <div style="width: 100%; background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02);">
                                    <div id="gaze-bar-${t.id}" style="height: 100%; background: linear-gradient(90deg, #3b82f6, #06b6d4); transition: width 0.5s ease-out;"></div>
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                                <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                                    <div class="metric-label">Neck Pitch</div>
                                    <div id="pitch-val-${t.id}" class="metric-val"></div>
                                </div>
                                <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                                    <div class="metric-label">Spine Lateral</div>
                                    <div id="spine-val-${t.id}" class="metric-val"></div>
                                </div>
                                <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                                    <div class="metric-label">Shoulder Roll</div>
                                    <div id="shoulder-val-${t.id}" class="metric-val"></div>
                                </div>
                                <div class="metric-card" style="background: rgba(15,23,42,0.4); padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);">
                                    <div style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Ocular Break Accumulator</div>
                                    <div id="ocular-val-${t.id}" style="font-size: 1.8rem; font-weight: 700; color: #fff; margin-top: 0.5rem;"></div>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                    
                    // DEBOUNCED UI DOM UPDATES (No HTML regeneration)
                    if (t.dashboard_indicators) {
                        updateStateDebounced(t.id, 'tracking', t.dashboard_indicators.tracking, t.dashboard_indicators);
                        updateStateDebounced(t.id, 'posture', t.dashboard_indicators.posture, t.dashboard_indicators);
                        updateStateDebounced(t.id, 'eyes', t.dashboard_indicators.eyes, t.dashboard_indicators);
                        updateStateDebounced(t.id, 'sitting', t.dashboard_indicators.sitting, t.dashboard_indicators, sitPct);
                        updateStateDebounced(t.id, 'movement', t.dashboard_indicators.movement, t.dashboard_indicators, standPct);
                    }
                    
                    document.getElementById(`sit-text-${t.id}`).textContent = `${Math.round(sittingTime/60)}m / ${Math.round(sessionLimit/60)}m`;
                    const sitBar = document.getElementById(`sit-bar-${t.id}`);
                    sitBar.style.width = `${sitPct}%`;
                    sitBar.className = `progress-bar ${sitPct > 90 ? 'danger' : ''}`;
                    
                    document.getElementById(`stand-text-${t.id}`).textContent = `${standingTime}s / ${standRequirement}s`;
                    document.getElementById(`stand-bar-${t.id}`).style.width = `${standPct}%`;
                    
                    document.getElementById(`pitch-val-${t.id}`).textContent = `${headPitch}°`;
                    document.getElementById(`spine-val-${t.id}`).textContent = `${Math.round(t.spine_alignment || 0)}°`;
                    document.getElementById(`shoulder-val-${t.id}`).textContent = `${Math.round(t.shoulder_alignment || 0)}°`;
                    
                    if(t.screen_gaze_current !== undefined) {
                        document.getElementById(`gaze-text-${t.id}`).textContent = `${Math.round(t.screen_gaze_current / 60)}m / ${Math.round(t.screen_gaze_max / 60)}m`;
                        document.getElementById(`gaze-bar-${t.id}`).style.width = `${(t.screen_gaze_current / Math.max(1, t.screen_gaze_max)) * 100}%`;
                        document.getElementById(`ocular-val-${t.id}`).textContent = `${Math.round(t.ocular_break_current || 0)}s / ${Math.round(t.ocular_break_max || 0)}s`;
                    }
                }
                
                // Cleanup stale cards dynamically
                Array.from(container.children).forEach(child => {
                    if (child.id && child.id.startsWith('target-card-')) {
                        const childId = child.id.replace('target-card-', '');
                        if (!currentTrackIds.has(childId)) {
                            container.removeChild(child);
                        }
                    }
                });
                
            } catch (e) {
                console.error("Telemetry error", e);
            }
        }

        async function pollProfiles() {
            try {
                const res = await fetch('/api/profiles');
                const profiles = await res.json();
                
                const container = document.getElementById('profiles-container');
                let html = `<div style="overflow-x: auto; padding-bottom: 15px; width: 100%;">
                    <table style="min-width: 1100px;">
                    <tr>
                        <th>Name</th>
                        <th>3D Posture Tolerance Edge</th>
                        <th>Continuous Sitting Cap (Minutes)</th>
                        <th>Required Stand Duration (Minutes)</th>
                        <th>Screen Gaze Limit (Minutes)</th>
                        <th>Ocular Break Duration (Minutes)</th>
                        <th>History Export</th>
                        <th>Actions</th>
                    </tr>`;
                
                Object.keys(profiles).forEach(username => {
                    const p = profiles[username];
                    let gazeLimitMin = Math.round(p.screen_gaze_limit / 60); 
                    let sitLimitMin = Math.round(p.session_limit / 60);
                    let standReqMin = Math.max(1, Math.round(p.stand_requirement / 60));
                    let breakDurationMin = Math.max(1, Math.round(p.ocular_break_duration / 60));
                    html += `
                        <tr>
                            <td style="font-weight: 500;">${username}</td>
                            <td><input type="range" min="5" max="45" value="${p.slouch_sensitivity}" onchange="updateProfile('${username}', this.value, ${p.session_limit}, ${p.stand_requirement}, ${p.screen_gaze_limit}, ${p.ocular_break_duration})"> <span>${p.slouch_sensitivity}°</span></td>
                            <td><input type="range" min="1" max="120" step="1" value="${sitLimitMin}" onchange="updateProfile('${username}', ${p.slouch_sensitivity}, (this.value * 60), ${p.stand_requirement}, ${p.screen_gaze_limit}, ${p.ocular_break_duration})"> <span>${sitLimitMin}m</span></td>
                            <td><input type="range" min="1" max="15" step="1" value="${standReqMin}" onchange="updateProfile('${username}', ${p.slouch_sensitivity}, ${p.session_limit}, (this.value * 60), ${p.screen_gaze_limit}, ${p.ocular_break_duration})"> <span>${standReqMin}m</span></td>
                            <td><input type="range" min="1" max="120" step="1" value="${gazeLimitMin}" onchange="updateProfile('${username}', ${p.slouch_sensitivity}, ${p.session_limit}, ${p.stand_requirement}, (this.value * 60), ${p.ocular_break_duration})"> <span>${gazeLimitMin}m</span></td>
                            <td><input type="range" min="1" max="15" step="1" value="${breakDurationMin}" onchange="updateProfile('${username}', ${p.slouch_sensitivity}, ${p.session_limit}, ${p.stand_requirement}, ${p.screen_gaze_limit}, (this.value * 60))"> <span>${breakDurationMin}m</span></td>
                            <td>
                                <a href="/api/export/csv/${username}" target="_blank" style="color: #10b981; text-decoration: none; font-size: 0.85rem; margin-right: 8px;">CSV</a>
                                <a href="/api/export/json/${username}" target="_blank" style="color: #38bdf8; text-decoration: none; font-size: 0.85rem;">JSON</a>
                            </td>
                            <td><button class="danger" onclick="deleteProfile('${username}')">Delete Profile</button></td>
                        </tr>
                    `;
                });
                html += '</table></div>';
                container.innerHTML = html;
            } catch (e) {
                console.error("Profile sync error", e);
            }
        }

        async function triggerManualRecalibrate() {
            try {
                const res = await fetch('/api/profile/recalibrate', { method: 'POST' });
                const data = await res.json();
                console.log(data.message);
            } catch (e) {
                console.error("Recalibration trigger failed", e);
            }
        }

        function createProfile() {
            const name = document.getElementById('new-profile-name').value;
            if (!name) return alert("Enter a valid profile name.");
            fetch('/api/profile/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            }).then(res => res.json()).then(data => {
                if (data.error) alert(data.error);
                document.getElementById('new-profile-name').value = '';
                pollProfiles();
                refreshLiveTelemetry();
            }).catch(e => console.error(e));
        }

        async function updateProfile(name, slouch_sens, limit, stand_req, screen_limit, break_duration) {
            await fetch('/api/profile/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    name, 
                    slouch_sensitivity: parseFloat(slouch_sens), 
                    session_limit: parseInt(limit),
                    stand_requirement: parseInt(stand_req),
                    screen_gaze_limit: parseInt(screen_limit),
                    ocular_break_duration: parseInt(break_duration)
                })
            });
            pollProfiles();
            refreshLiveTelemetry();
        }

        async function deleteProfile(name) {
            if(!confirm("Are you sure you want to permanently delete profile '" + name + "'?")) return;
            await fetch('/api/profile/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });
            pollProfiles();
            refreshLiveTelemetry();
        }

        async function pollSystemDiagnostics() {
            try {
                const res = await fetch('/api/system/health');
                const health = await res.json();
                
                const diagHtml = `
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span>System Architecture</span> <strong style="color: #38bdf8;">${health.platform} ${health.arch}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span>Edge NPU Node</span> <strong style="color: ${health.is_embedded ? '#10b981' : '#f59e0b'};">${health.is_embedded ? 'TRUE' : 'FALSE'}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span>Hardware Accl. (GPU/NPU)</span> <strong style="color: ${(health.has_gpu || health.has_npu) ? '#10b981' : '#f59e0b'};">${(health.has_gpu || health.has_npu) ? 'ACTIVE' : 'FALLBACK'}</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span>Total Available RAM</span> <strong style="color: #fff;">${health.ram_gb.toFixed(2)} GB</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Live Tracked Sessions</span> <strong style="color: #38bdf8;">${health.tracked_targets}</strong>
                    </div>
                `;
                document.getElementById('diagnostics-container').innerHTML = diagHtml;
                
                if (health.last_system_message) {
                    const msgEl = document.getElementById('system-message-text');
                    if (msgEl) msgEl.innerText = health.last_system_message;
                }
            } catch (e) {
                console.error("System diagnostics error", e);
            }
        }

        let analyticsChart = null;

        async function pollHistoricalAnalytics() {
            // Pick the first tracked target from live telemetry as primary user to chart
            const container = document.getElementById('targets-container');
            if (!container || container.children.length === 0 || container.innerHTML.includes('offline')) return;
            
            // Hacky extraction of primary user name
            let primaryUser = null;
            const nameEl = container.querySelector('[id^="name-"]');
            if (nameEl && nameEl.textContent) {
                primaryUser = nameEl.textContent;
            }
            if (!primaryUser || primaryUser === "Unknown") return;

            try {
                const res = await fetch(`/api/history/${primaryUser}`);
                let historyData = await res.json();
                
                // Reverse to show chronological order
                historyData = historyData.reverse();

                const labels = historyData.map(d => new Date(d.timestamp + "Z").toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}));
                const pitchData = historyData.map(d => d.average_head_pitch || 0);
                const spineData = historyData.map(d => d.spine_alignment || 0);

                if (analyticsChart) {
                    analyticsChart.data.labels = labels;
                    analyticsChart.data.datasets[0].data = pitchData;
                    analyticsChart.data.datasets[1].data = spineData;
                    analyticsChart.update('none'); // no animation for smooth polling
                } else {
                    const ctx = document.getElementById('analyticsChart').getContext('2d');
                    analyticsChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: 'Neck Pitch (°)',
                                    data: pitchData,
                                    borderColor: '#38bdf8',
                                    tension: 0.3,
                                    fill: false
                                },
                                {
                                    label: 'Spine Lateral (°)',
                                    data: spineData,
                                    borderColor: '#f59e0b',
                                    tension: 0.3,
                                    fill: false
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { labels: { color: '#94a3b8' } }
                            },
                            scales: {
                                x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                                y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                            },
                            animation: { duration: 0 }
                        }
                    });
                }
            } catch (e) {
                console.error("Historical analytics error", e);
            }
        }

        setInterval(refreshLiveTelemetry, 1000);
        setInterval(pollProfiles, 4000);
        setInterval(pollSystemDiagnostics, 5000);
        setInterval(pollHistoricalAnalytics, 10000);
        
        window.onload = () => {
            refreshLiveTelemetry();
            pollProfiles();
            pollSystemDiagnostics();
            pollHistoricalAnalytics();
        };
    </script>
</body>
</html>
